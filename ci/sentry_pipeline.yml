name: Sentry Security Pipeline

on:
  schedule:
    # Run every Monday at 9 AM UTC - weekly security scan
    - cron: '0 9 * * 1'
  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dependencies
          - code

concurrency:
  group: sentry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --json > audit-report.json

      - name: Check for outdated dependencies
        run: npm outdated --json > outdated-report.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            audit-report.json
            outdated-report.json
          retention-days: 30

      - name: Parse audit results
        run: |
          node -e "
            const fs = require('fs');
            try {
              const audit = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
              const vulns = audit.metadata?.vulnerabilities || {};
              const total = Object.values(vulns).reduce((a, b) => a + b, 0);
              console.log('Total vulnerabilities:', total);
              if (total > 0) {
                console.log('High:', vulns.high || 0);
                console.log('Critical:', vulns.critical || 0);
              }
            } catch (e) {
              console.log('No vulnerabilities found or parse error');
            }
          "

  code-security-scan:
    name: Static Code Security Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint security rules
        run: npm run lint -- --format=json > eslint-report.json || true

      - name: Check for exposed secrets
        run: |
          # Basic check for potential secrets in code
          grep -r "password\s*=" app/ --include="*.ts" --include="*.tsx" || true
          grep -r "api[_-]key\s*=" app/ --include="*.ts" --include="*.tsx" || true
          grep -r "secret\s*=" app/ --include="*.ts" --include="*.tsx" || true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 14

  tool-inventory-validate:
    name: Tool Inventory Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'full'
    steps:
      - uses: actions/checkout@v4

      - name: Validate tool inventory
        run: python3 scripts/monitor/health-check.js 2>&1 | grep -E "(inventory|Tools)" || echo "Health check ran"

      - name: Check inventory sync
        run: |
          echo "Checking inventory.json sync..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const inv = JSON.parse(fs.readFileSync('data/tools/inventory.json', 'utf8'));
            const toolsDir = 'app/tools';
            const dirs = fs.readdirSync(toolsDir);
            console.log('Inventory tools:', inv.tools.length);
            console.log('Actual tool dirs:', dirs.length);
            console.log('Production:', inv.stats.production);
            console.log('Beta:', inv.stats.beta || 0);
            console.log('Planned:', inv.stats.planned);
          "

  weekly-report:
    name: Generate Weekly Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-security-scan, tool-inventory-validate]
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Generate summary
        run: |
          echo "# OpsecForge Weekly Security Report" > security-report.md
          echo "" >> security-report.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-report.md
          echo "- Code Security: ${{ needs.code-security-scan.result }}" >> security-report.md
          echo "- Tool Inventory: ${{ needs.tool-inventory-validate.result }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Action Items" >> security-report.md
          echo "- Review any failed checks" >> security-report.md
          echo "- Update dependencies if vulnerabilities found" >> security-report.md
          echo "- Verify tool inventory is in sync" >> security-report.md

      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report
          path: security-report.md
          retention-days: 90
