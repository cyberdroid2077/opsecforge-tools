name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint
        continue-on-error: true
        # Known pre-existing issues tracked in .eslintignore — CI reports but does not block

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck --pretty -p tsconfig.health.json || true
        # tsconfig.health.json excludes known pre-existing issues (jwt-encoder, TextDiffTool)
        # Project uses ignoreBuildErrors:true in next.config

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities in lockfile
        run: npm audit --package-lock-only --audit-level=high
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Vitest
        run: npm install --save-dev vitest @testing-library/react @testing-library/dom @testing-library/jest-dom jsdom
        if: always()

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  monitor:
    name: Runtime Health Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run health check script
        run: |
          node --experimental-vm-modules scripts/monitor/health-check.js || true

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, audit, build, test, monitor]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Summary
        run: |
          echo "## :warning: OpsecForge CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline failed on ${{ github.ref }}. Check the artifacts for details." >> $GITHUB_STEP_SUMMARY
